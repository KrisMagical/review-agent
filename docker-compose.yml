services:
  dashboard:
    build: .
    image: magicreview:local
    command: mgreview dashboard serve --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./.magicreview:/data
      - ./:/workspace:ro
    env_file:
      - path: .env
        required: false
    environment:
      MGREVIEW_DB_PATH: /data/magicreview.db
      MGREVIEW_DASHBOARD_HOST: 0.0.0.0
      MGREVIEW_DASHBOARD_PORT: 8080
      MGREVIEW_LLM_PROVIDER: none
      MGREVIEW_NETWORK_ENABLED: "false"
      MGREVIEW_ALLOW_LLM: "false"
      MGREVIEW_CODE_SHARING_MODE: none
      MGREVIEW_AUTH_ENABLED: ${MGREVIEW_AUTH_ENABLED:-false}
      MGREVIEW_ADMIN_USERNAME: ${MGREVIEW_ADMIN_USERNAME:-admin}
      MGREVIEW_ADMIN_PASSWORD: ${MGREVIEW_ADMIN_PASSWORD:-}
      MGREVIEW_SESSION_SECRET: ${MGREVIEW_SESSION_SECRET:-}
      MGREVIEW_API_KEYS: ${MGREVIEW_API_KEYS:-}
      MGREVIEW_COOKIE_SECURE: ${MGREVIEW_COOKIE_SECURE:-false}
      MGREVIEW_BASIC_AUTH_ENABLED: ${MGREVIEW_BASIC_AUTH_ENABLED:-false}
      MGREVIEW_ALLOWED_REVIEW_ROOTS: ${MGREVIEW_ALLOWED_REVIEW_ROOTS:-/workspace}
      MGREVIEW_MAX_UPLOAD_BYTES: ${MGREVIEW_MAX_UPLOAD_BYTES:-5242880}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  github-app:
    build: .
    image: magicreview:local
    command: mgreview github-app serve
    ports:
      - "8000:8000"
    volumes:
      - ./.magicreview:/data
    env_file:
      - path: .env
        required: false
    environment:
      MGREVIEW_DB_PATH: /data/magicreview.db
      MGREVIEW_GITHUB_HOST: 0.0.0.0
      MGREVIEW_GITHUB_PORT: 8000
      MGREVIEW_GITHUB_ENABLE_LLM: "false"
      MGREVIEW_GITHUB_ENABLE_AGENTS: "false"
      MGREVIEW_GITHUB_REVIEW_MODE: diff_only
      MGREVIEW_LLM_PROVIDER: none
      MGREVIEW_NETWORK_ENABLED: "false"
      MGREVIEW_ALLOW_LLM: "false"
      MGREVIEW_CODE_SHARING_MODE: none
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp:
    build: .
    image: magicreview:local
    command: mgreview mcp
    stdin_open: true
    tty: true
    profiles:
      - mcp
    environment:
      MGREVIEW_LLM_PROVIDER: none
      MGREVIEW_NETWORK_ENABLED: "false"
      MGREVIEW_ALLOW_LLM: "false"
      MGREVIEW_CODE_SHARING_MODE: none
