services:
  dashboard:
    build: .
    image: reviewagent:local
    command: reviewagent-dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./.reviewagent:/data
      - ./:/workspace:ro
    env_file:
      - path: .env
        required: false
    environment:
      REVIEWAGENT_DB_PATH: /data/reviewagent.db
      REVIEWAGENT_DASHBOARD_HOST: 0.0.0.0
      REVIEWAGENT_DASHBOARD_PORT: 8080
      REVIEWAGENT_LLM_PROVIDER: none
      REVIEWAGENT_NETWORK_ENABLED: "false"
      REVIEWAGENT_ALLOW_LLM: "false"
      REVIEWAGENT_CODE_SHARING_MODE: none
      REVIEWAGENT_AUTH_ENABLED: ${REVIEWAGENT_AUTH_ENABLED:-false}
      REVIEWAGENT_ADMIN_USERNAME: ${REVIEWAGENT_ADMIN_USERNAME:-admin}
      REVIEWAGENT_ADMIN_PASSWORD: ${REVIEWAGENT_ADMIN_PASSWORD:-}
      REVIEWAGENT_SESSION_SECRET: ${REVIEWAGENT_SESSION_SECRET:-}
      REVIEWAGENT_API_KEYS: ${REVIEWAGENT_API_KEYS:-}
      REVIEWAGENT_COOKIE_SECURE: ${REVIEWAGENT_COOKIE_SECURE:-false}
      REVIEWAGENT_BASIC_AUTH_ENABLED: ${REVIEWAGENT_BASIC_AUTH_ENABLED:-false}
      REVIEWAGENT_ALLOWED_REVIEW_ROOTS: ${REVIEWAGENT_ALLOWED_REVIEW_ROOTS:-/workspace}
      REVIEWAGENT_MAX_UPLOAD_BYTES: ${REVIEWAGENT_MAX_UPLOAD_BYTES:-5242880}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  github-app:
    build: .
    image: reviewagent:local
    command: reviewagent-github-app
    ports:
      - "8000:8000"
    volumes:
      - ./.reviewagent:/data
    env_file:
      - path: .env
        required: false
    environment:
      REVIEWAGENT_DB_PATH: /data/reviewagent.db
      REVIEWAGENT_GITHUB_HOST: 0.0.0.0
      REVIEWAGENT_GITHUB_PORT: 8000
      REVIEWAGENT_GITHUB_ENABLE_LLM: "false"
      REVIEWAGENT_GITHUB_ENABLE_AGENTS: "false"
      REVIEWAGENT_GITHUB_REVIEW_MODE: diff_only
      REVIEWAGENT_LLM_PROVIDER: none
      REVIEWAGENT_NETWORK_ENABLED: "false"
      REVIEWAGENT_ALLOW_LLM: "false"
      REVIEWAGENT_CODE_SHARING_MODE: none
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp:
    build: .
    image: reviewagent:local
    command: reviewagent-mcp
    stdin_open: true
    tty: true
    profiles:
      - mcp
    environment:
      REVIEWAGENT_LLM_PROVIDER: none
      REVIEWAGENT_NETWORK_ENABLED: "false"
      REVIEWAGENT_ALLOW_LLM: "false"
      REVIEWAGENT_CODE_SHARING_MODE: none
