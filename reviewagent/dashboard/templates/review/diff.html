{% extends "base.html" %}
{% block content %}
<h2>Review Diff</h2>
{% if error %}<p class="error-message">{{ error }}</p>{% endif %}
<section class="settings-warning">Uploads are read in memory, reviewed, and not stored as source artifacts.</section>
<form class="settings-form" method="post" action="/review/diff" enctype="multipart/form-data">
  <label>
    Paste diff
    <textarea name="diff_text" rows="14" placeholder="diff --git a/app.py b/app.py"></textarea>
  </label>
  <label>
    Or upload .diff / .patch
    <input type="file" name="diff_file" accept=".diff,.patch,text/plain">
  </label>
  <label>
    Agents
    <input type="text" name="agents" placeholder="quality,security">
  </label>
  <label>
    LLM provider
    <select name="llm_provider">
      {% for value in ["none", "mock", "openai", "anthropic", "azure_openai", "openai_compatible", "ollama", "enterprise_gateway"] %}
      <option value="{{ value }}">{{ value }}</option>
      {% endfor %}
    </select>
  </label>
  <label>
    Code sharing mode
    <select name="code_sharing_mode">
      {% for value in ["none", "summary_only", "snippets", "full_context"] %}
      <option value="{{ value }}">{{ value }}</option>
      {% endfor %}
    </select>
  </label>
  <section class="settings-warning danger">Selecting snippets or full_context may send source context if LLM review is enabled and network is allowed.</section>
  <div class="checkbox-row">
    <label><input type="checkbox" name="save_result" checked> Save result</label>
    <label><input type="checkbox" name="enable_agents"> Enable agents</label>
    <label><input type="checkbox" name="enable_llm"> Enable LLM</label>
    <label><input type="checkbox" name="allow_network"> Allow network</label>
    <label><input type="checkbox" name="allow_llm"> Allow LLM network use</label>
    <label><input type="checkbox" name="enable_enterprise_rules" checked> Enterprise rules</label>
  </div>
  <label>
    Config path
    <input type="text" name="config_path" placeholder="/workspace/reviewagent.yml">
  </label>
  <div class="actions"><button type="submit">Run diff review</button></div>
</form>
{% endblock %}
