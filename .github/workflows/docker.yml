name: Docker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t magicreview:test .

      - name: Smoke test CLI in Docker
        run: |
          docker run --rm magicreview:test mgreview --help
          docker run --rm magicreview:test mgreview --version
          docker run --rm magicreview:test python -m magicreview.cli.main --help
          docker run --rm magicreview:test mgreview file examples/bad_code.py --format json

      - name: Validate Compose config
        run: docker compose config
