name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    env:
      MGREVIEW_LLM_PROVIDER: none
      MGREVIEW_NETWORK_ENABLED: "false"
      MGREVIEW_ALLOW_LLM: "false"
      MGREVIEW_CODE_SHARING_MODE: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,dev]"

      - name: Run tests
        run: pytest --basetemp=.pytest_tmp

      - name: Smoke test CLI
        run: |
          mgreview --help
          mgreview --version
          mgreview file examples/bad_code.py --format json
          mgreview project examples/multi_agent_project --agents --format json
          python -m magicreview.cli.main --help
